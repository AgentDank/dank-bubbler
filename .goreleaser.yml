# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# .goreleaser.yml
# CGO-free release builds for go-booba CLI utilities.

version: 2

project_name: dank-bubbler

before:
  hooks:
    - go mod tidy

builds:
  - id: dank-bubbler-ct
    main: ./cmd/dank-bubbler-ct
    binary: dank-bubbler-ct
    ldflags:
      - -s -w -X github.com/AgentDank/dank-bubbler/internal/version.Version={{.Version}}
    # duckdb-go-bindings is CGO-only; each platform subpackage has an
    # untagged `import "C"` so CGO_ENABLED must be 1 for every target.
    # CC/CXX names below match the toolchains in ghcr.io/goreleaser/goreleaser-cross.
    env:
      - CGO_ENABLED=1
      - >-
        {{- if eq .Os "linux" }}
        {{- if eq .Arch "amd64" }}CC=x86_64-linux-gnu-gcc{{- end }}
        {{- if eq .Arch "arm64" }}CC=aarch64-linux-gnu-gcc{{- end }}
        {{- end }}
        {{- if eq .Os "darwin" }}
        {{- if eq .Arch "amd64" }}CC=o64-clang{{- end }}
        {{- if eq .Arch "arm64" }}CC=oa64-clang{{- end }}
        {{- end }}
        {{- if eq .Os "windows" }}
        {{- if eq .Arch "amd64" }}CC=x86_64-w64-mingw32-gcc{{- end }}
        {{- end }}
      - >-
        {{- if eq .Os "linux" }}
        {{- if eq .Arch "amd64" }}CXX=x86_64-linux-gnu-g++{{- end }}
        {{- if eq .Arch "arm64" }}CXX=aarch64-linux-gnu-g++{{- end }}
        {{- end }}
        {{- if eq .Os "darwin" }}
        {{- if eq .Arch "amd64" }}CXX=o64-clang++{{- end }}
        {{- if eq .Arch "arm64" }}CXX=oa64-clang++{{- end }}
        {{- end }}
        {{- if eq .Os "windows" }}
        {{- if eq .Arch "amd64" }}CXX=x86_64-w64-mingw32-g++{{- end }}
        {{- end }}
    goarch:
      # duckdb-go only supports these
      - amd64
      - arm64
    goos:
      - linux
      - darwin
      - windows
    ignore:
      # duckdb-go does not support these
      - goos: windows
        goarch: arm64

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE.txt
      - README.md

checksum:
  name_template: checksums.txt

notarize:
  macos:
    - enabled: '{{ isEnvSet "MACOS_SIGN_P12" }}'
      ids:
        - dank-bubbler-ct
      sign:
        certificate: "{{.Env.MACOS_SIGN_P12}}"
        password: "{{.Env.MACOS_SIGN_PASSWORD}}"
        entitlements: ./etc/entitlements.plist
      notarize:
        issuer_id: "{{.Env.MACOS_NOTARY_ISSUER_ID}}"
        key_id: "{{.Env.MACOS_NOTARY_KEY_ID}}"
        key: "{{.Env.MACOS_NOTARY_KEY}}"
        wait: true
        timeout: 20m

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
