version: '3'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task -l

  build:
    desc: Build all tools
    cmds:
      - task: build-demo

  build-demo:
    desc: Build brand-demo tool
    cmds:
      - echo "Building brand-demo..."
      - go build -o ./bin/db-brand-demo ./cmd/brand-demo

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf ./bin
      - go clean

  install:
    desc: Install tools into $GOPATH/bin
    deps:
      - build
    cmds:
      - go install ./cmd/brand-demo

  test:
    desc: Run tests
    deps: [tidy]
    cmds:
      - go test -v ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  fmt:
    desc: Format code
    run: once
    cmds:
      - go fmt ./...
      - gofmt -s -w .

  tidy:
    desc: Tidy go.mod
    run: once
    cmds:
      - go mod tidy

  run:
    desc: Run brand-demo (requires --db flag)
    deps:
      - build
    cmds:
      - ./bin/db-brand-demo {{.CLI_ARGS}}
