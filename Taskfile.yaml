version: '3'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task -l

  tidy:
    desc: Tidy go.mod
    run: once
    cmds:
      - go mod tidy

  test:
    desc: Run tests
    deps: [tidy]
    cmds:
      - go test -v ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  fmt:
    desc: Format code
    run: once
    cmds:
      - go fmt ./...
      - gofmt -s -w .

  build:
    desc: Build dank-bubbler-ct tool
    deps: [tidy]
    cmds:
      - go build -o ./bin/dank-bubbler-ct ./cmd/dank-bubbler-ct

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf ./bin
      - go clean

  run:
    desc: Run dank-bubbler-ct (requires --db flag)
    deps: [build]
    cmds:
      - ./bin/dank-bubbler-ct {{.CLI_ARGS}}

###############################################################################

  goreleaser:check:
    desc: 'Validate GoReleaser configuration'
    cmds:
      - goreleaser check

  goreleaser:build:
    desc: 'Build binary for current platform only (fast, no publish)'
    deps: [goreleaser:check]
    cmds:
      - goreleaser build --snapshot --clean --single-target

  goreleaser:snapshot:
    desc: 'Build full local snapshot (archives, checksums, no publish). Requires CGO cross-compilers for non-host targets.'
    deps: [goreleaser:check]
    cmds:
      - goreleaser release --snapshot --clean
