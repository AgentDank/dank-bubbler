version: '3'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task -l

  tidy:
    desc: Tidy go.mod
    run: once
    cmds:
      - go mod tidy

  test:
    desc: Run tests
    deps: [tidy]
    cmds:
      - go test -v ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  fmt:
    desc: Format code
    run: once
    cmds:
      - go fmt ./...
      - gofmt -s -w .

  build:
    desc: Build dank-bubbler-ct tool
    deps: [tidy]
    cmds:
      - go build -o ./bin/dank-bubbler-ct ./cmd/dank-bubbler-ct

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf ./bin
      - go clean

  run:
    desc: Run dank-bubbler-ct (requires --db flag)
    deps: [build]
    cmds:
      - ./bin/dank-bubbler-ct {{.CLI_ARGS}}
