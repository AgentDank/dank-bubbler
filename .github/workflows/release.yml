# Release workflow — cuts a goreleaser release on tag push (v*).
#
# Runs on ubuntu-latest via the goreleaser-cross container, which bundles
# osxcross, musl-cross, mingw-w64, and rcodesign — covering all 5 targets
# in .goreleaser.yml (darwin amd64/arm64, linux amd64/arm64, windows amd64).
# macOS notarization uses Apple's notary API via rcodesign, driven by the
# MACOS_NOTARY_* / MACOS_SIGN_* secrets.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GORELEASER_CROSS_VERSION: v2.15.4
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run goreleaser
        run: |
          docker run --rm \
            -e GITHUB_TOKEN \
            -e HOMEBREW_TAP_GITHUB_TOKEN \
            -e MACOS_SIGN_P12 \
            -e MACOS_SIGN_PASSWORD \
            -e MACOS_NOTARY_ISSUER_ID \
            -e MACOS_NOTARY_KEY_ID \
            -e MACOS_NOTARY_KEY \
            -v "$(pwd)":/go/src/github.com/${{ github.repository }} \
            -w /go/src/github.com/${{ github.repository }} \
            ghcr.io/goreleaser/goreleaser-cross:${GORELEASER_CROSS_VERSION} \
            release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
